<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐠 Ocean World - ท้องทะเลมหัศจรรย์</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #001133; font-family: 'Segoe UI', sans-serif; }
  #canvas { display: block; width: 100vw; height: 100vh; cursor: grab; touch-action: none; }
  #canvas:active { cursor: grabbing; }

  #hud {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(0,20,60,0.75); backdrop-filter: blur(12px);
    border: 1px solid rgba(100,200,255,0.3); border-radius: 40px;
    padding: 8px 22px; color: #7ee8ff; font-size: 12px;
    letter-spacing: 1px; pointer-events: none;
    text-shadow: 0 0 10px rgba(100,220,255,0.8);
    white-space: nowrap;
  }
  #hud span { margin: 0 8px; }
  #hud .key {
    background: rgba(100,200,255,0.15); border: 1px solid rgba(100,200,255,0.4);
    border-radius: 6px; padding: 1px 7px; font-weight: bold;
  }

  /* On-screen joystick buttons */
  #controls {
    position: fixed; left: 20px; bottom: 100px;
    display: grid; grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 50px; gap: 4px;
    pointer-events: none;
  }
  .ctrl-btn {
    background: rgba(0,40,100,0.7); border: 1px solid rgba(100,200,255,0.4);
    border-radius: 12px; color: #7ee8ff; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; pointer-events: all;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(0,80,200,0.8);
    box-shadow: 0 0 12px rgba(0,150,255,0.5);
  }
  /* up/down float buttons */
  #ud-controls {
    position: fixed; left: 20px; bottom: 50px;
    display: flex; gap: 6px; pointer-events: none;
  }
  #ud-controls .ctrl-btn { width: 78px; height: 36px; pointer-events: all; font-size: 14px; }

  /* Upload Panel */
  #upload-panel {
    position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
    background: rgba(0,15,50,0.88); backdrop-filter: blur(16px);
    border: 1px solid rgba(100,200,255,0.25); border-radius: 20px;
    padding: 16px; width: 190px;
    box-shadow: 0 0 30px rgba(0,100,200,0.3);
    color: #a0e8ff; z-index: 10;
  }
  #upload-panel h3 {
    font-size: 13px; letter-spacing: 2px; text-align: center;
    color: #7ee8ff; margin-bottom: 12px; text-transform: uppercase;
    text-shadow: 0 0 10px rgba(100,220,255,0.7);
  }
  #upload-panel .bubble-deco { text-align: center; font-size: 24px; margin-bottom: 8px; }

  .upload-slot {
    background: rgba(0,40,100,0.5); border: 2px dashed rgba(100,200,255,0.3);
    border-radius: 12px; padding: 10px 6px; margin-bottom: 10px;
    text-align: center; cursor: pointer; transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .upload-slot:hover { border-color: rgba(100,200,255,0.7); background: rgba(0,60,140,0.5); }
  .upload-slot input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-slot .slot-label { font-size: 10px; color: #60c8f0; letter-spacing: 1px; margin-top: 3px; }
  .upload-slot .slot-icon { font-size: 20px; }
  .upload-slot .preview-img {
    width: 100%; height: 60px; object-fit: cover;
    border-radius: 8px; display: none; margin-bottom: 4px;
  }
  .btn-place {
    width: 100%; padding: 9px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #0066cc, #00aaff);
    color: white; font-size: 12px; letter-spacing: 1px; cursor: pointer;
    transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,150,255,0.4);
  }
  .btn-place:hover { background: linear-gradient(135deg,#0088ff,#00ccff); }
  .divider { height: 1px; background: linear-gradient(90deg,transparent,rgba(100,200,255,0.3),transparent); margin: 12px 0; }

  #crosshair {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    pointer-events: none; width: 20px; height: 20px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(100,220,255,0.6); border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 20px; left: 9px; }
  #crosshair::after { width: 20px; height: 2px; top: 9px; }

  #depth {
    position: fixed; left: 180px; bottom: 30px;
    background: rgba(0,15,50,0.8); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,200,255,0.25); border-radius: 14px;
    padding: 10px 16px; color: #60c8f0; font-size: 11px; letter-spacing: 1px;
  }
  #depth .depth-val { font-size: 20px; font-weight: bold; color: #7ee8ff; display: block; }

  #bubbles-overlay { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(200,240,255,0.6), rgba(100,200,255,0.1));
    border: 1px solid rgba(150,220,255,0.4);
    animation: floatBubble linear infinite;
  }
  @keyframes floatBubble {
    0% { transform: translateY(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100vh); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="hud">
  <span>🖱️ <span class="key">Drag</span> มองรอบทิศ</span>
  <span>⌨️ <span class="key">WASD / ↑↓←→</span> เดิน</span>
  <span>🎮 ใช้ปุ่มด้านล่างซ้าย</span>
</div>
<div id="crosshair"></div>
<div id="depth">🌊 ความลึก<span class="depth-val" id="depth-val">0 m</span></div>

<!-- On-screen controls -->
<div id="controls">
  <div></div>
  <div class="ctrl-btn" id="btn-f" onpointerdown="setMove('f',1)" onpointerup="setMove('f',0)" onpointerleave="setMove('f',0)">▲</div>
  <div></div>
  <div class="ctrl-btn" id="btn-l" onpointerdown="setMove('l',1)" onpointerup="setMove('l',0)" onpointerleave="setMove('l',0)">◄</div>
  <div class="ctrl-btn" id="btn-b" onpointerdown="setMove('b',1)" onpointerup="setMove('b',0)" onpointerleave="setMove('b',0)">▼</div>
  <div class="ctrl-btn" id="btn-r" onpointerdown="setMove('r',1)" onpointerup="setMove('r',0)" onpointerleave="setMove('r',0)">►</div>
</div>
<div id="ud-controls">
  <div class="ctrl-btn" onpointerdown="setMove('u',1)" onpointerup="setMove('u',0)" onpointerleave="setMove('u',0)">⬆ ลอยขึ้น</div>
  <div class="ctrl-btn" onpointerdown="setMove('d',1)" onpointerup="setMove('d',0)" onpointerleave="setMove('d',0)">⬇ ดำลง</div>
</div>

<!-- Upload Panel -->
<div id="upload-panel">
  <div class="bubble-deco">🐙</div>
  <h3>📸 แกลเลอรี่ใต้ทะเล</h3>
  <div class="upload-slot" id="slot1">
    <input type="file" accept="image/*" onchange="handleUpload(event,1)">
    <img class="preview-img" id="prev1">
    <div class="slot-icon">🪸</div>
    <div class="slot-label">กรอบที่ 1 - คลิกอัปโหลด</div>
  </div>
  <div class="upload-slot" id="slot2">
    <input type="file" accept="image/*" onchange="handleUpload(event,2)">
    <img class="preview-img" id="prev2">
    <div class="slot-icon">🐚</div>
    <div class="slot-label">กรอบที่ 2 - คลิกอัปโหลด</div>
  </div>
  <div class="upload-slot" id="slot3">
    <input type="file" accept="image/*" onchange="handleUpload(event,3)">
    <img class="preview-img" id="prev3">
    <div class="slot-icon">⭐</div>
    <div class="slot-label">กรอบที่ 3 - คลิกอัปโหลด</div>
  </div>
  <div class="divider"></div>
  <button class="btn-place" onclick="placePhotosInWorld()">🌊 วางรูปในโลกใต้ทะเล</button>
  <div style="font-size:10px;color:#407090;text-align:center;margin-top:6px;">รูปจะปรากฏบนกรอบใต้น้ำ</div>
</div>

<div id="bubbles-overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── CANVAS TEXTURES ──────────────────────────────────────────
function mkTex(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return new THREE.CanvasTexture(c); }

function sandTex(){ return mkTex(512,512,(ctx,w,h)=>{ const g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#c8a96e'); g.addColorStop(1,'#a07840'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h); for(let i=0;i<2000;i++){ ctx.fillStyle=`rgba(${Math.random()>.5?180:100},${Math.random()>.5?140:80},40,${Math.random()*.4})`; const s=Math.random()*3+1; ctx.fillRect(Math.random()*w,Math.random()*h,s,s*.5); } }); }
function waterTex(){ return mkTex(512,512,(ctx,w,h)=>{ const g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#001a4d'); g.addColorStop(.5,'#003380'); g.addColorStop(1,'#001a4d'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h); ctx.strokeStyle='rgba(100,180,255,0.15)'; ctx.lineWidth=1; for(let i=0;i<20;i++){ ctx.beginPath(); for(let x=0;x<w;x+=8){ const y=(i/20)*h+Math.sin(x/30+i)*8; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke(); } }); }
function coralTex(c1,c2){ return mkTex(256,256,(ctx,w,h)=>{ ctx.fillStyle=c1; ctx.fillRect(0,0,w,h); ctx.fillStyle=c2; for(let i=0;i<40;i++){ ctx.beginPath(); ctx.arc(Math.random()*w,Math.random()*h,Math.random()*15+5,0,Math.PI*2); ctx.fill(); } }); }
function rockTex(){ return mkTex(256,256,(ctx,w,h)=>{ const g=ctx.createRadialGradient(w/2,h/2,10,w/2,h/2,w/2); g.addColorStop(0,'#888'); g.addColorStop(1,'#444'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h); for(let i=0;i<60;i++){ ctx.fillStyle=`rgba(0,0,0,${Math.random()*.3})`; ctx.fillRect(Math.random()*w,Math.random()*h,Math.random()*20+2,Math.random()*4+1); } }); }
function fishTex(body,stripe,fin){ return mkTex(256,128,(ctx,w,h)=>{ ctx.fillStyle=body; ctx.beginPath(); ctx.ellipse(w*.45,h/2,w*.38,h*.42,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle=fin; ctx.beginPath(); ctx.moveTo(w*.85,h/2); ctx.lineTo(w,h*.1); ctx.lineTo(w,h*.9); ctx.closePath(); ctx.fill(); ctx.strokeStyle=stripe; ctx.lineWidth=8; for(let i=0;i<3;i++){ ctx.beginPath(); ctx.ellipse(w*(.25+i*.18),h/2,w*.04,h*.38,0,0,Math.PI*2); ctx.stroke(); } ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(w*.2,h*.38,h*.1,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(w*.2,h*.38,h*.06,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(w*.22,h*.35,h*.02,0,Math.PI*2); ctx.fill(); ctx.fillStyle=fin; ctx.beginPath(); ctx.moveTo(w*.3,h*.08); ctx.quadraticCurveTo(w*.45,-h*.1,w*.6,h*.08); ctx.quadraticCurveTo(w*.45,h*.2,w*.3,h*.08); ctx.fill(); }); }
function jellyTex(){ return mkTex(128,128,(ctx,w,h)=>{ const g=ctx.createRadialGradient(w/2,h/3,5,w/2,h/3,w/2); g.addColorStop(0,'rgba(255,150,255,0.9)'); g.addColorStop(1,'rgba(180,80,220,0.3)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(w/2,h/3,w/2.2,Math.PI,0); ctx.fill(); ctx.strokeStyle='rgba(255,180,255,0.6)'; ctx.lineWidth=2; for(let i=0;i<6;i++){ ctx.beginPath(); ctx.moveTo(w*.3+i*w*.07,h*.55); ctx.bezierCurveTo(w*(.25+i*.07)+10,h*.7,w*(.2+i*.07)-5,h*.85,w*(.25+i*.07)+5,h); ctx.stroke(); } }); }
function turtleTex(){ return mkTex(256,256,(ctx,w,h)=>{ ctx.fillStyle='#2d7a2d'; ctx.beginPath(); ctx.ellipse(w/2,h/2,w*.4,h*.35,0,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#1a4d1a'; ctx.lineWidth=3; for(let i=0;i<3;i++) for(let j=0;j<3;j++) ctx.strokeRect(w*.2+i*w*.2,h*.2+j*h*.18,w*.18,h*.16); ctx.fillStyle='#3d9c3d'; ctx.beginPath(); ctx.ellipse(w*.15,h/2,w*.1,h*.08,0,0,Math.PI*2); ctx.fill(); for(const[fx,fy,rx,ry,rot] of[[w*.3,h*.15,w*.2,h*.08,-.4],[w*.3,h*.85,w*.2,h*.08,.4],[w*.7,h*.15,w*.2,h*.08,.4],[w*.7,h*.85,w*.2,h*.08,-.4]]){ ctx.save(); ctx.translate(fx,fy); ctx.rotate(rot); ctx.fillStyle='#3d9c3d'; ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2); ctx.fill(); ctx.restore(); } ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(w*.12,h*.47,w*.015,0,Math.PI*2); ctx.fill(); }); }
function frameTex(label){ return mkTex(512,384,(ctx,w,h)=>{ ctx.fillStyle='rgba(0,30,80,0.7)'; ctx.fillRect(0,0,w,h); ctx.strokeStyle='rgba(100,200,255,0.6)'; ctx.lineWidth=8; ctx.strokeRect(4,4,w-8,h-8); ctx.strokeStyle='rgba(150,220,255,0.3)'; ctx.lineWidth=3; ctx.strokeRect(14,14,w-28,h-28); ctx.fillStyle='rgba(100,220,255,0.5)'; ctx.font='bold 22px Arial'; ctx.textAlign='center'; ctx.fillText(label,w/2,h-14); ctx.font='56px Arial'; ctx.fillStyle='rgba(100,180,255,0.3)'; ctx.fillText('🐠',w/2-28,h/2+16); ctx.font='15px Arial'; ctx.fillStyle='rgba(150,200,255,0.4)'; ctx.fillText('อัปโหลดรูปจากแผงขวา →',w/2,h/2+58); }); }
function seaweedTex(){ return mkTex(64,256,(ctx,w,h)=>{ const g=ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#1a8040'); g.addColorStop(1,'#0d4020'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h); ctx.fillStyle='rgba(80,200,100,0.4)'; for(let i=0;i<8;i++){ ctx.beginPath(); ctx.ellipse(w/2+Math.sin(i)*8,h*.1+i*h*.1,w*.25,h*.06,Math.sin(i)*.3,0,Math.PI*2); ctx.fill(); } }); }
function starfishTex(){ return mkTex(128,128,(ctx,w,h)=>{ ctx.fillStyle='#e8603c'; ctx.beginPath(); for(let i=0;i<5;i++){ const a=i*Math.PI*2/5-Math.PI/2,a2=a+Math.PI/5; ctx.lineTo(w/2+Math.cos(a)*w*.45,h/2+Math.sin(a)*h*.45); ctx.lineTo(w/2+Math.cos(a2)*w*.18,h/2+Math.sin(a2)*h*.18); } ctx.closePath(); ctx.fill(); }); }
function bubbleTex(){ return mkTex(64,64,(ctx,w,h)=>{ const g=ctx.createRadialGradient(w*.4,h*.35,2,w/2,h/2,w/2); g.addColorStop(0,'rgba(220,240,255,0.9)'); g.addColorStop(.4,'rgba(150,210,255,0.3)'); g.addColorStop(1,'rgba(100,180,255,0.05)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(w/2,h/2,w/2-2,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(180,230,255,0.6)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(w/2,h/2,w/2-2,0,Math.PI*2); ctx.stroke(); }); }

// ── SCENE ────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.fog = new THREE.FogExp2(0x001840, 0.018);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001030);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0,3,0);

// Lights
scene.add(new THREE.AmbientLight(0x0033aa, 0.5));
const sun = new THREE.DirectionalLight(0x4488ff,0.8); sun.position.set(10,30,10); sun.castShadow=true; scene.add(sun);
[[0x0088ff,0.6,[0,10,0]],[0x00aaff,0.4,[15,8,-10]],[0x0066cc,0.5,[-10,6,15]]].forEach(([c,i,p])=>{ const pl=new THREE.PointLight(c,i,40); pl.position.set(...p); scene.add(pl); });

// Floor
const floorGeo = new THREE.PlaneGeometry(200,200,50,50);
const fp = floorGeo.attributes.position;
for(let i=0;i<fp.count;i++) fp.setY(i, Math.sin(fp.getX(i)*.2)*.3+Math.cos(fp.getZ(i)*.15)*.4+(Math.random()-.5)*.3);
floorGeo.computeVertexNormals();
const floor = new THREE.Mesh(floorGeo, new THREE.MeshLambertMaterial({map:sandTex()}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);

// Water
const water = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshLambertMaterial({map:waterTex(),color:0x003399,transparent:true,opacity:.35,side:THREE.DoubleSide}));
water.rotation.x=-Math.PI/2; water.position.y=18; scene.add(water);

// Fish
const FISH_DEFS = [
  {body:'#ff6622',stripe:'#fff',fin:'#ff4400'},{body:'#ffcc00',stripe:'#ff6600',fin:'#ff8800'},
  {body:'#6688ff',stripe:'#fff',fin:'#4466ff'},{body:'#ff44aa',stripe:'#ffccee',fin:'#cc0077'},
  {body:'#44dd88',stripe:'#fff',fin:'#22aa66'},{body:'#ff8800',stripe:'#fff',fin:'#cc6600'},
  {body:'#aa44ff',stripe:'#ddaaff',fin:'#7722cc'},{body:'#ff3344',stripe:'#ffaaaa',fin:'#cc1122'}
];
const fishMeshes=[];
for(let i=0;i<40;i++){
  const fd=FISH_DEFS[i%FISH_DEFS.length];
  const a=(i/40)*Math.PI*2, r=8+Math.random()*25;
  const geo=new THREE.PlaneGeometry(1.8,.9);
  const mat=new THREE.MeshLambertMaterial({map:fishTex(fd.body,fd.stripe,fd.fin),transparent:true,alphaTest:.1,side:THREE.DoubleSide});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(Math.cos(a)*r, 2+Math.random()*6, Math.sin(a)*r);
  m.userData={phase:Math.random()*Math.PI*2,speed:.5+Math.random()*1,radius:4+Math.random()*8,cx:Math.cos(a)*r,cz:Math.sin(a)*r,bob:1+Math.random()*2,amp:.3+Math.random()*.5};
  scene.add(m); fishMeshes.push(m);
}

// Jellyfish
const jellyMeshes=[];
for(let i=0;i<12;i++){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(1.5,1.5), new THREE.MeshLambertMaterial({map:jellyTex(),transparent:true,alphaTest:.05,side:THREE.DoubleSide}));
  m.position.set((Math.random()-.5)*40,5+Math.random()*5,(Math.random()-.5)*40);
  m.userData={phase:Math.random()*Math.PI*2,bob:1+Math.random()};
  scene.add(m); jellyMeshes.push(m);
}

// Turtles
const turtles=[];
for(let i=0;i<2;i++){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(3,3), new THREE.MeshLambertMaterial({map:turtleTex(),transparent:true,alphaTest:.1,side:THREE.DoubleSide}));
  m.position.set(i?-15:10, 5, i?10:-5); m.userData={phase:Math.random()*Math.PI*2};
  scene.add(m); turtles.push(m);
}

// Corals
const coralColors=[['#ff4488','#ff88cc'],['#ff8800','#ffcc44'],['#44aaff','#88ddff'],['#ff3344','#ff8866'],['#aa44ff','#dd99ff']];
for(let i=0;i<25;i++){
  const cc=coralColors[i%coralColors.length], a=(i/25)*Math.PI*2, r=8+Math.random()*18;
  for(let j=0;j<3;j++){
    const h=1.5+Math.random()*2.5, rr=.3+Math.random()*.4;
    const m=new THREE.Mesh(new THREE.CylinderGeometry(rr*(.5-j*.1),rr,h*(j*.3+.4),6), new THREE.MeshLambertMaterial({map:coralTex(...cc)}));
    m.position.set(Math.cos(a)*r+Math.random()*5+(j-1)*rr*1.5, h*.3, Math.sin(a)*r+Math.random()*5);
    m.castShadow=true; scene.add(m);
  }
}

// Rocks
for(let i=0;i<20;i++){
  const m=new THREE.Mesh(new THREE.DodecahedronGeometry(.8+Math.random()*1.5,0), new THREE.MeshLambertMaterial({map:rockTex()}));
  m.position.set((Math.random()-.5)*60,.4,(Math.random()-.5)*60); m.rotation.set(Math.random(),Math.random(),Math.random()); scene.add(m);
}

// Seaweed
const seaweedMeshes=[];
for(let i=0;i<40;i++){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(.6,2+Math.random()*2), new THREE.MeshLambertMaterial({map:seaweedTex(),transparent:true,alphaTest:.1,side:THREE.DoubleSide}));
  m.position.set((Math.random()-.5)*50,1,(Math.random()-.5)*50); m.userData={phase:Math.random()*Math.PI*2};
  scene.add(m); seaweedMeshes.push(m);
}

// Starfish
for(let i=0;i<10;i++){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshLambertMaterial({map:starfishTex(),transparent:true,alphaTest:.1}));
  m.rotation.x=-Math.PI/2; m.position.set((Math.random()-.5)*40,.05,(Math.random()-.5)*40); scene.add(m);
}

// 3D Bubbles
const bubbleMeshes=[];
for(let i=0;i<80;i++){
  const m=new THREE.Mesh(new THREE.SphereGeometry(.12,8,8), new THREE.MeshLambertMaterial({map:bubbleTex(),transparent:true,opacity:.6}));
  m.position.set((Math.random()-.5)*50,Math.random()*15,(Math.random()-.5)*50);
  m.userData={speed:.02+Math.random()*.05}; scene.add(m); bubbleMeshes.push(m);
}

// Photo frames
const frames=[];
[[-12,4,8],[8,4,-12],[0,4,15]].forEach(([x,y,z],i)=>{
  const mat=new THREE.MeshLambertMaterial({map:frameTex(['📸 กรอบที่ 1','📸 กรอบที่ 2','📸 กรอบที่ 3'][i]),side:THREE.DoubleSide});
  const m=new THREE.Mesh(new THREE.PlaneGeometry(4,3),mat);
  m.position.set(x,y,z); m.lookAt(0,y,0);
  const border=new THREE.Mesh(new THREE.BoxGeometry(4.4,3.4,.1), new THREE.MeshLambertMaterial({color:0x004488}));
  border.position.set(x,y,z); border.lookAt(0,y,0);
  scene.add(border); scene.add(m); frames.push({mesh:m,mat});
});

// ── UPLOAD ───────────────────────────────────────────────────
const uploadedTex=[null,null,null];
window.handleUpload=function(e,slot){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      document.getElementById('prev'+slot).src=ev.target.result;
      document.getElementById('prev'+slot).style.display='block';
      document.getElementById('slot'+slot).querySelector('.slot-icon').style.display='none';
      document.getElementById('slot'+slot).querySelector('.slot-label').textContent='✅ อัปโหลดแล้ว';
      const tex=new THREE.Texture(img); tex.needsUpdate=true; uploadedTex[slot-1]=tex;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};
window.placePhotosInWorld=function(){
  uploadedTex.forEach((tex,i)=>{ if(tex){ frames[i].mat.map=tex; frames[i].mat.needsUpdate=true; } });
  const btn=document.querySelector('.btn-place');
  btn.textContent='✅ วางรูปแล้ว!'; btn.style.background='linear-gradient(135deg,#006633,#00aa55)';
  setTimeout(()=>{ btn.textContent='🌊 วางรูปในโลกใต้ทะเล'; btn.style.background=''; },2000);
};

// ── CONTROLS (no pointer lock needed) ────────────────────────
const euler = new THREE.Euler(0,0,0,'YXZ');
const velocity = new THREE.Vector3();
let moveF=0,moveB=0,moveL=0,moveR=0,moveU=0,moveD=0;
const SPEED=6;

// on-screen buttons
window.setMove=function(dir,val){
  if(dir==='f') moveF=val; if(dir==='b') moveB=val;
  if(dir==='l') moveL=val; if(dir==='r') moveR=val;
  if(dir==='u') moveU=val; if(dir==='d') moveD=val;
};

// keyboard
document.addEventListener('keydown',e=>{
  switch(e.code){
    case 'KeyW':case'ArrowUp':    moveF=1; break;
    case 'KeyS':case'ArrowDown':  moveB=1; break;
    case 'KeyA':case'ArrowLeft':  moveL=1; break;
    case 'KeyD':case'ArrowRight': moveR=1; break;
    case 'Space': moveU=1; e.preventDefault(); break;
    case 'ShiftLeft':case'ShiftRight': moveD=1; break;
  }
});
document.addEventListener('keyup',e=>{
  switch(e.code){
    case 'KeyW':case'ArrowUp':    moveF=0; break;
    case 'KeyS':case'ArrowDown':  moveB=0; break;
    case 'KeyA':case'ArrowLeft':  moveL=0; break;
    case 'KeyD':case'ArrowRight': moveR=0; break;
    case 'Space': moveU=0; break;
    case 'ShiftLeft':case'ShiftRight': moveD=0; break;
  }
});

// Mouse drag to look (works in iframe — no pointer lock needed)
let isDragging=false, lastX=0, lastY=0;
canvas.addEventListener('mousedown', e=>{ isDragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', ()=>{ isDragging=false; });
window.addEventListener('mousemove', e=>{
  if(!isDragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  euler.setFromQuaternion(camera.quaternion);
  euler.y -= dx*0.004;
  euler.x -= dy*0.004;
  euler.x=Math.max(-Math.PI/2+.01, Math.min(Math.PI/2-.01, euler.x));
  camera.quaternion.setFromEuler(euler);
});

// Touch drag to look
let lastTX=0, lastTY=0;
canvas.addEventListener('touchstart', e=>{ if(e.touches.length===1){ lastTX=e.touches[0].clientX; lastTY=e.touches[0].clientY; } }, {passive:true});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===1){
    const dx=e.touches[0].clientX-lastTX, dy=e.touches[0].clientY-lastTY;
    lastTX=e.touches[0].clientX; lastTY=e.touches[0].clientY;
    euler.setFromQuaternion(camera.quaternion);
    euler.y -= dx*0.004; euler.x -= dy*0.004;
    euler.x=Math.max(-Math.PI/2+.01, Math.min(Math.PI/2-.01, euler.x));
    camera.quaternion.setFromEuler(euler);
  }
}, {passive:true});

// CSS bubbles overlay
const bubblesOverlay=document.getElementById('bubbles-overlay');
function spawnBubble(){ const b=document.createElement('div'); b.className='bubble'; const s=4+Math.random()*16; b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:0;animation-duration:${4+Math.random()*8}s;animation-delay:${Math.random()*2}s`; bubblesOverlay.appendChild(b); setTimeout(()=>b.remove(),12000); }
setInterval(spawnBubble,300);

// ── ANIMATE ──────────────────────────────────────────────────
const clock=new THREE.Clock();
const depthVal=document.getElementById('depth-val');
const tmpDir=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), t=clock.elapsedTime;

  // Movement
  tmpDir.set(moveR-moveL, 0, moveB-moveF);
  if(tmpDir.length()>.01){ tmpDir.normalize(); tmpDir.applyQuaternion(camera.quaternion); tmpDir.y=0; camera.position.addScaledVector(tmpDir,SPEED*dt); }
  camera.position.y += (moveU-moveD)*SPEED*dt;
  camera.position.y=Math.max(.5,Math.min(17,camera.position.y));
  camera.position.x=Math.max(-90,Math.min(90,camera.position.x));
  camera.position.z=Math.max(-90,Math.min(90,camera.position.z));
  depthVal.textContent=Math.round((17-camera.position.y)*3)+' m';

  // Fish
  fishMeshes.forEach(f=>{
    const d=f.userData; d.phase+=dt*d.speed;
    f.position.x=d.cx+Math.cos(d.phase)*d.radius;
    f.position.z=d.cz+Math.sin(d.phase)*d.radius*.5;
    f.position.y=2+Math.abs(Math.sin(t*d.bob*.5+d.phase*.3))*5+Math.sin(t*d.bob+d.phase)*d.amp;
    f.rotation.y=Math.atan2(-Math.sin(d.phase)*d.radius, Math.cos(d.phase)*d.radius*.5)+Math.PI;
    f.lookAt(camera.position);
  });

  // Jellyfish
  jellyMeshes.forEach(j=>{ j.userData.phase+=dt*.5; j.position.y=5+Math.sin(t*j.userData.bob+j.userData.phase)*1.5; j.lookAt(camera.position); });

  // Turtles
  turtles.forEach((m,i)=>{ m.userData.phase+=dt*.15; m.position.x=Math.cos(m.userData.phase+i)*18; m.position.z=Math.sin(m.userData.phase+i)*12; m.position.y=4+Math.sin(t*.5+i)*.8; m.lookAt(camera.position); });

  // Bubbles
  bubbleMeshes.forEach(b=>{ b.position.y+=b.userData.speed; b.position.x+=Math.sin(t+b.position.z)*.005; if(b.position.y>18){ b.position.set((Math.random()-.5)*50,0,(Math.random()-.5)*50); } });

  // Water
  water.position.y=18+Math.sin(t*.5)*.2; water.material.opacity=.3+Math.sin(t*.3)*.05;

  // Seaweed
  seaweedMeshes.forEach(s=>{ s.rotation.z=Math.sin(t*1.5+s.userData.phase)*.15; });

  // Frames always face player
  frames.forEach(f=>{ const p=f.mesh.position; f.mesh.lookAt(camera.position.x,p.y,camera.position.z); });

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
